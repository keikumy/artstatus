<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEIKUMY Art Status 🌸</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Pacifico&display=swap');

:root {
--main-pink: #ffafbd;
--dark-pink: #ff85a1;
--soft-white: #fff5f7;
--text-color: #8a4f66;
}

body {
margin: 0;
padding: 0;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
font-family: 'Comfortaa', cursive;
overflow: hidden;
}

/* Декоративные плавающие кружочки на фоне */
.bg-decor {
position: absolute;
background: rgba(255, 255, 255, 0.3);
border-radius: 50%;
z-index: 0;
animation: float-bg 6s infinite ease-in-out;
}

.card {
position: relative;
z-index: 1;
background: var(--soft-white);
border: 4px solid white;
border-radius: 40px;
padding: 40px 30px;
width: 340px;
text-align: center;
box-shadow: 0 15px 35px rgba(255, 133, 161, 0.4);
animation: card-float 4s infinite ease-in-out;
}

/* Бантик сверху */
.ribbon {
position: absolute;
top: -25px;
left: 50%;
transform: translateX(-50%);
font-size: 50px;
}

h1 {
font-family: 'Pacifico', cursive;
color: var(--dark-pink);
font-size: 32px;
margin: 10px 0 25px 0;
text-shadow: 2px 2px 0px white;
}

.status-container {
display: flex;
flex-direction: column;
gap: 15px;
}

.status-item {
background: white;
padding: 15px;
border-radius: 25px;
display: flex;
justify-content: space-between;
align-items: center;
border: 2px dashed var(--main-pink);
color: var(--text-color);
font-weight: bold;
transition: 0.3s;
}

.status-item:hover { transform: scale(1.05);
border-style: solid;
}

.badge {
background: var(--dark-pink);
color: white;
padding: 5px 15px;
border-radius: 15px;
font-size: 14px;
box-shadow: 0 4px 10px rgba(255, 133, 161, 0.3);
animation: pulse 2s infinite;
}

.contact-box {
margin-top: 30px;
padding: 15px;
background: rgba(255, 182, 193, 0.2);
border-radius: 20px;
font-size: 13px;
color: var(--text-color);
line-height: 1.5;
}

.contact-box a {
color: var(--dark-pink);
text-decoration: none;
font-weight: bold;
display: inline-block;
margin-top: 5px;
border-bottom: 2px solid transparent;
transition: 0.3s;
}

.contact-box a:hover {
border-bottom: 2px solid var(--dark-pink);
}

.footer {
margin-top: 30px;
font-size: 11px;
color: #b08797;
text-transform: uppercase;
letter-spacing: 1px;
}

.footer b {
color: var(--dark-pink);
font-size: 14px;
}

/* Анимации */
@keyframes card-float {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-15px); }
}

@keyframes pulse {
0% { transform: scale(1); bo
20:21

x-shadow: 0 0 0 0 rgba(255, 133, 161, 0.7); }
    70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 133, 161, 0); }
100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 133, 161, 0); }
}

@keyframes float-bg {
0% { transform: translateY(0) rotate(0); }
50% { transform: translateY(-100px) rotate(45deg); }
100% { transform: translateY(0) rotate(0); }
}
</style>
</head>
<body>

<!-- Декор на фоне -->
<div class="bg-decor" style="width: 100px; height: 100px; top: 10%; left: 10%;"></div>
<div class="bg-decor" style="width: 150px; height: 150px; bottom: 10%; right: 10%;"></div>
<div class="bg-decor" style="width: 50px; height: 50px; top: 40%; right: 20%;"></div>

<div class="card">
<div class="ribbon">🎀</div>
<h1>Art Status</h1>

<div class="status-container">
<div class="status-item">
<span>🎨 Commission</span>
<span class="badge">Open</span>
</div>
<div class="status-item">
<span>🤝 Trades</span>
<span class="badge">Open</span>
</div>
<div class="status-item">
<span>✨ Collabs</span>
<span class="badge">Open</span>
</div>
</div>

<div class="contact-box">
If you have any questions, please contact

<a href="https://t.me/helldine">@helldine</a> in personal messages. 💌
</div>

<div class="footer">
All information belongs to

<b>KEIKUMY</b>

@copyright
</div>
</div>

</body>
</html>
